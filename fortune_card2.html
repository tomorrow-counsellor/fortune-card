<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運命の刻 — あなただけの運勢カード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --sunset-deep: #0d1b2a;
    --sunset-ocean: #1a3a5c;
    --sunset-horizon: #c2410c;
    --sunset-amber: #f97316;
    --sunset-gold: #fbbf24;
    --sunset-rose: #fb7185;
    --sunset-blush: #fda4af;
    --sunset-sky: #7c3aed;
    --sunset-purple: #4c1d95;
    --glass-bg: rgba(255, 255, 255, 0.07);
    --glass-border: rgba(255, 200, 150, 0.25);
    --glass-shine: rgba(255, 220, 180, 0.15);
    --text-gold: #fde68a;
    --text-light: rgba(255, 240, 220, 0.9);
    --text-dim: rgba(255, 220, 180, 0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Noto Serif JP', serif;
    background: var(--sunset-deep);
    overflow-x: hidden;
    position: relative;
  }

  /* 夕暮れ海の背景 */
  .sky {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(249,115,22,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 50% 85%, rgba(251,191,36,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 20% 70%, rgba(76,29,149,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 80% 60%, rgba(194,65,12,0.3) 0%, transparent 60%),
      linear-gradient(
        to bottom,
        #0d1b2a 0%,
        #1a3a5c 30%,
        #2d4a6e 45%,
        #7c3aed 55%,
        #c2410c 68%,
        #f97316 78%,
        #fbbf24 85%,
        #fb7185 90%,
        #f97316 95%,
        #c2410c 100%
      );
  }

  /* 海の波エフェクト */
  .waves {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 35vh;
    z-index: 1;
    overflow: hidden;
  }

  .wave {
    position: absolute;
    bottom: 0;
    left: -50%;
    width: 200%;
    border-radius: 40%;
  }

  .wave-1 {
    height: 100%;
    background: rgba(13,27,42,0.85);
    animation: wave 8s linear infinite;
  }
  .wave-2 {
    height: 90%;
    background: rgba(26,58,92,0.6);
    animation: wave 11s linear infinite reverse;
    bottom: -5%;
  }
  .wave-3 {
    height: 80%;
    background: rgba(194,65,12,0.15);
    animation: wave 14s linear infinite;
    bottom: -10%;
  }

  @keyframes wave {
    0% { transform: translateX(0) rotate(0deg); }
    100% { transform: translateX(50%) rotate(360deg); }
  }

  /* 光の粒子 */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(251,191,36,0.7);
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-20vh) translateX(var(--drift)) scale(1); opacity: 0; }
  }

  /* メインコンテンツ */
  .container {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 1.2s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header-en {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(10px, 2.5vw, 13px);
    letter-spacing: 0.3em;
    color: var(--text-dim);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .header-title {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: clamp(28px, 6vw, 48px);
    color: var(--text-gold);
    text-shadow:
      0 0 40px rgba(251,191,36,0.4),
      0 0 80px rgba(249,115,22,0.2);
    letter-spacing: 0.15em;
    line-height: 1.3;
    margin-bottom: 16px;
  }

  .header-sub {
    font-size: clamp(12px, 2.5vw, 14px);
    color: var(--text-dim);
    letter-spacing: 0.2em;
    font-weight: 300;
  }

  /* 入力フォーム */
  .form-card {
    width: 100%;
    max-width: 480px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 40px 36px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.3),
      inset 0 1px 0 var(--glass-shine);
    animation: fadeUp 1.2s ease 0.3s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-group {
    margin-bottom: 28px;
  }

  .form-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'Cinzel Decorative', cursive;
  }

  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text-light);
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    outline: none;
    transition: all 0.3s ease;
    -webkit-appearance: none;
  }

  .form-input:focus {
    border-color: rgba(251,191,36,0.5);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 20px rgba(249,115,22,0.15);
  }

  .form-input::placeholder { color: rgba(255,220,180,0.3); }

  .form-input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7) sepia(1) saturate(5) hue-rotate(5deg);
    opacity: 0.7;
    cursor: pointer;
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #f97316, #fbbf24, #fb7185);
    border: none;
    border-radius: 14px;
    color: #0d1b2a;
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(249,115,22,0.4);
  }
  .btn-submit:hover::before { opacity: 1; }
  .btn-submit:active { transform: translateY(0); }

  /* ===== 運勢カード ===== */
  #fortune-section {
    width: 100%;
    max-width: 520px;
    margin-top: 40px;
    display: none;
    animation: revealCard 1s ease both;
  }

  @keyframes revealCard {
    0% { opacity: 0; transform: translateY(60px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  #fortune-card {
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.1) 0%,
      rgba(249,115,22,0.08) 30%,
      rgba(251,191,36,0.06) 60%,
      rgba(255,255,255,0.08) 100%
    );
    border: 1px solid rgba(251,191,36,0.35);
    border-radius: 28px;
    padding: 44px 36px;
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,220,180,0.2),
      inset 0 -1px 0 rgba(249,115,22,0.1),
      0 0 80px rgba(249,115,22,0.08);
    position: relative;
    overflow: hidden;
  }

  /* カード内の装飾光 */
  #fortune-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(
      ellipse 60% 40% at 60% 40%,
      rgba(251,191,36,0.08) 0%,
      transparent 70%
    );
    pointer-events: none;
  }

  .card-header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }

  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(251,191,36,0.4), transparent);
    margin: 20px 0;
  }

  .card-greeting {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    font-family: 'Cinzel Decorative', cursive;
    margin-bottom: 10px;
  }

  .card-name {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 600;
    color: var(--text-gold);
    letter-spacing: 0.12em;
    text-shadow: 0 0 30px rgba(251,191,36,0.5);
    margin-bottom: 6px;
  }

  .card-birth {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  /* 数字バッジ */
  .numbers-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 28px 0;
    flex-wrap: wrap;
  }

  .number-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .number-circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid rgba(251,191,36,0.4);
    background: rgba(249,115,22,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel Decorative', cursive;
    font-size: 18px;
    color: var(--sunset-gold);
    text-shadow: 0 0 10px rgba(251,191,36,0.6);
    backdrop-filter: blur(10px);
  }

  .number-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-align: center;
    font-family: 'Cinzel Decorative', cursive;
  }

  /* 守護要素 */
  .element-section {
    text-align: center;
    margin: 24px 0;
    padding: 20px;
    background: rgba(249,115,22,0.08);
    border-radius: 16px;
    border: 1px solid rgba(251,191,36,0.2);
  }

  .element-icon {
    font-size: 36px;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(251,191,36,0.5));
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(251,191,36,0.5)); }
    50% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(249,115,22,0.7)); }
  }

  .element-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-gold);
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }

  .element-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    font-family: 'Cinzel Decorative', cursive;
  }

  /* 運勢メッセージ */
  .fortune-sections {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin: 28px 0;
  }

  .fortune-item {
    padding: 16px 20px;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    border-left: 3px solid var(--sunset-amber);
  }

  .fortune-item-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--sunset-amber);
    font-family: 'Cinzel Decorative', cursive;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fortune-item-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(249,115,22,0.2);
  }

  .fortune-item-text {
    font-size: clamp(13px, 3vw, 15px);
    color: var(--text-light);
    line-height: 1.8;
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  /* ラッキーカラー */
  .lucky-section {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: center;
    margin: 24px 0;
    flex-wrap: wrap;
  }

  .lucky-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    font-family: 'Cinzel Decorative', cursive;
  }

  .lucky-colors {
    display: flex;
    gap: 8px;
  }

  .color-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
    position: relative;
  }

  .color-dot::after {
    content: attr(data-name);
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 0.1em;
  }

  /* 今日の一言 */
  .today-word {
    text-align: center;
    margin: 24px 0 8px;
    padding: 24px;
    background: linear-gradient(135deg, rgba(251,191,36,0.08), rgba(249,115,22,0.05));
    border-radius: 18px;
    border: 1px solid rgba(251,191,36,0.2);
  }

  .today-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(16px, 4vw, 22px);
    color: var(--text-gold);
    line-height: 1.6;
    text-shadow: 0 0 20px rgba(251,191,36,0.3);
    margin-bottom: 12px;
  }

  .today-meaning {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    letter-spacing: 0.05em;
    font-weight: 300;
  }

  /* カード下部 */
  .card-footer {
    text-align: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(251,191,36,0.15);
  }

  .card-footer-text {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    font-family: 'Cinzel Decorative', cursive;
  }

  /* 保存ボタン */
  .btn-save {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 14px;
    color: var(--text-gold);
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    backdrop-filter: blur(10px);
  }

  .btn-save:hover {
    background: rgba(251,191,36,0.15);
    border-color: rgba(251,191,36,0.5);
    box-shadow: 0 0 20px rgba(249,115,22,0.2);
    transform: translateY(-1px);
  }

  .btn-save:active { transform: translateY(0); }

  /* ローディング */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,27,42,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
  }

  .loading-overlay.show { display: flex; }

  .loading-spinner {
    font-size: 48px;
    animation: spin 1.5s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* スマホ対応 */
  @media (max-width: 480px) {
    .form-card, #fortune-card {
      padding: 32px 24px;
    }
    .numbers-row { gap: 10px; }
    .number-circle { width: 44px; height: 44px; font-size: 15px; }
  }
</style>
</head>
<body>

<div class="sky"></div>

<div class="waves">
  <div class="wave wave-1"></div>
  <div class="wave wave-2"></div>
  <div class="wave wave-3"></div>
</div>

<div class="particles" id="particles"></div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner">🌅</div>
</div>

<div class="container">
  <div class="header">
    <div class="header-en">Destiny Reading</div>
    <h1 class="header-title">運命の刻</h1>
    <div class="header-sub">— あなただけの星が、今宵も海に語りかける —</div>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label class="form-label" for="name">お名前</label>
      <input class="form-input" type="text" id="name" placeholder="例：山田 花子" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label" for="birth">生年月日</label>
      <input class="form-input" type="date" id="birth" max="2099-12-31">
    </div>
    <button class="btn-submit" onclick="generateFortune()">✦ 運勢を読み解く ✦</button>
  </div>

  <div id="fortune-section">
    <div id="fortune-card">
      <!-- JS で生成 -->
    </div>
    <button class="btn-save" onclick="saveCard()">
      <span>🖼️</span>
      <span>PNG で保存する</span>
    </button>
  </div>
</div>

<script>
// 光の粒子生成
(function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 1;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      --drift:${(Math.random()-0.5)*80}px;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*15}s;
      opacity:${Math.random()*0.6+0.2};
    `;
    container.appendChild(p);
  }
})();

// ===== 運勢データ =====

  { name: '🌙 月の導き', icon: '🌙', en: 'Moon Guide', color: '#c4b5fd',
    trait: '繊細な感受性と洞察力', power: '内省と変容' },
  { name: '⭐ 星の記憶', icon: '⭐', en: 'Star Memory', color: '#fbbf24',

  { name: '🌿 大地の芽吹き', icon: '🌿', en: 'Earth Sprout', color: '#4ade80',
    trait: '安定した意志と継続力', power: '育成と繁栄' },
  { name: '🌸 風の花びら', icon: '🌸', en: 'Wind Petal', color: '#f9a8d4',
    trait: '自由な発想と柔軟な心', power: '調和と繋がり' },
  { name: '💎 光の結晶', icon: '💎', en: 'Light Crystal', color: '#e0e7ff',
    trait: '純粋な誠実さと透明感', power: '浄化と明晰' },
  { name: '🌺 太陽の花', icon: '🌺', en: 'Sun Flower', color: '#fde68a',
    trait: '明るさと温かさで周囲を照らす', power: '活力と希望' },
  { name: '🦋 変容の翼', icon: '🦋', en: 'Transform Wing', color: '#fb7185',
    trait: '絶えず進化し続ける魂', power: '成長と再生' },
];

const LOVE_MSGS = [
  '今のあなたには、言葉よりも「存在」そのものが人を引き寄せます。自分の感情に正直でいることが、最高の愛の言葉です。',

  '過去の傷が癒えるとき、本当の縁が動き出します。今はただ、自分を大切にすることだけを考えて。',
  '心が交差する瞬間は、予期せぬ場所にあります。日常の小さな出会いを大切に。',

const DAYS_JP = ['日', '月', '火', '水', '木', '金', '土'];

function calcNumerology(dateStr, name) {
  // 生命数（誕生日の数字の総和を1桁に）
  const digits = dateStr.replace(/-/g, '');
  let sum = digits.split('').reduce((a, b) => a + parseInt(b), 0);
  while (sum > 9 && sum !== 11 && sum !== 22) {
    sum = sum.toString().split('').reduce((a, b) => a + parseInt(b), 0);
  }

  // 名前の数秘（文字コードベース）
  let nameSum = 0;
  for (const c of name) { nameSum += c.charCodeAt(0); }
  let nameNum = nameSum % 9 + 1;

  return { lifeNum: sum, nameNum };
}

function generateFortune() {

// PNG保存
async function saveCard() {
  const loading = document.getElementById('loading');
  loading.classList.add('show');

  try {
    const card = document.getElementById('fortune-card');
    const canvas = await html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: '#1a1a2e',
      logging: false,
      onclone: (doc) => {
        const cloned = doc.getElementById('fortune-card');
        if (cloned) {
          cloned.style.borderRadius = '0';
          cloned.style.padding = '60px 48px';
        }
      }
    });

    const link = document.createElement('a');
    const name = document.getElementById('name').value.trim() || 'fortune';
    link.download = `運勢カード_${name}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    alert('保存中にエラーが発生しました。もう一度お試しください。');
    console.error(err);
  } finally {
    loading.classList.remove('show');
  }
}
